name: Deploy Aldiratech Website

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/aldiratech-website:latest
          build-args: |
            VITE_GITHUB_OWNER=${{ secrets.GH_OWNER }}
            VITE_GITHUB_REPO=${{ secrets.GH_REPO }}
            VITE_GITHUB_WEBHOOK_SECRET=${{ secrets.GH_WEBHOOK_SECRET }}

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/aldiratech-website:latest
            docker stop aldiratech-website || true
            docker rm aldiratech-website || true
            docker run -d \
              --name aldiratech-website \
              --restart unless-stopped \
              --network zivelogin-network-prod \
              -p 3001:80 \
              -e VITE_GITHUB_OWNER="${{ secrets.GH_OWNER }}" \
              -e VITE_GITHUB_REPO="${{ secrets.GH_REPO }}" \
              -e VITE_GITHUB_WEBHOOK_SECRET="${{ secrets.GH_WEBHOOK_SECRET }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/aldiratech-website:latest
            docker image prune -f